# ============================================================
# nginx.conf — Sample Nginx config for VPS deployment
# Place at: /etc/nginx/sites-available/socialhub
# Then: sudo ln -s /etc/nginx/sites-available/socialhub /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — use Certbot/Let's Encrypt to generate these
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Max upload size (for post images)
    client_max_body_size 10M;

    # Static files served directly by Nginx (fastest)
    location /static/ {
        alias /home/ubuntu/socialhub/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Media files (user uploads)
    location /media/ {
        alias /home/ubuntu/socialhub/media/;
        expires 7d;
    }

    # Everything else → Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }
}
